<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>小鸽剧场工作台🤯</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>:root{--bg:#fff7f8;--card:#ffffffee;--ink:#2a1518;--muted:#8f6269;--line:#f4d8dd;--red:#c92335;--red2:#ff6b78;--pink:#ffe7eb;--cream:#fffaf3;--shadow:0 18px 45px rgba(166,38,55,.16);--r:26px}*{box-sizing:border-box}html{font-size:16px}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 8% 0,#ffd6dd 0 18rem,transparent 25rem),radial-gradient(circle at 100% 12%,#fff0c7 0 14rem,transparent 24rem),linear-gradient(180deg,#fff7f8,#fffaf3 55%,#fff7f8);padding:18px}.app{width:min(1120px,100%);margin:auto}.hero{position:relative;overflow:hidden;border:1px solid #ffffffb0;border-radius:34px;padding:26px;background:linear-gradient(135deg,#fff,#fff0f2 52%,#fff9e9);box-shadow:var(--shadow)}.hero:after{content:'🐦';position:absolute;right:20px;top:8px;font-size:78px;opacity:.16;transform:rotate(-10deg)}.eyebrow{display:inline-flex;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;color:var(--red);font-weight:800;font-size:.82rem}.hero h1{margin:16px 0 10px;font-size:clamp(2rem,6vw,4.2rem);line-height:1;letter-spacing:-.05em}.hero p{margin:0;color:var(--muted);font-size:1rem;line-height:1.7;max-width:680px}.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.pill{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 12px;color:#7d343c;font-weight:750;font-size:.9rem}.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:18px;margin-top:18px}.card{background:var(--card);border:1px solid #ffffffc8;border-radius:var(--r);box-shadow:var(--shadow);padding:20px}.card h2,.card h3{margin:0}.titleRow{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}.sub{color:var(--muted);font-size:.92rem;margin-top:5px}.status{padding:11px 13px;border-radius:18px;background:#fff4f6;border:1px solid var(--line);color:#8e1e2b;font-weight:800}.form{display:grid;grid-template-columns:1fr 1fr;gap:13px}.field{display:flex;flex-direction:column;gap:7px}.full{grid-column:1/-1}label{font-size:.86rem;color:#74464d;font-weight:800}input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px 14px;font:inherit;color:var(--ink);outline:none;min-height:50px}textarea{min-height:88px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:#ff8e99;box-shadow:0 0 0 4px #ff6b781f}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.btn{border:0;border-radius:18px;padding:13px 17px;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--red),var(--red2));box-shadow:0 12px 22px rgba(201,35,53,.22);cursor:pointer}.btn.secondary{background:#fff;color:var(--red);border:1px solid var(--line);box-shadow:none}.btn.danger{background:#3a2528}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.stat{position:relative;overflow:hidden;border-radius:24px;padding:18px;background:linear-gradient(135deg,#fff,#fff1f3);border:1px solid var(--line)}.stat b{display:block;font-size:2.15rem;line-height:1;margin-bottom:8px;color:var(--red)}.stat span{color:var(--muted);font-weight:800}.stat:after{content:'✦';position:absolute;right:16px;top:10px;color:#ff9aa5;font-size:1.3rem}.monthLine{display:flex;gap:10px;align-items:center;margin:13px 0 14px}.monthLine input{max-width:180px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border-radius:999px;background:#fff;border:1px solid var(--line);padding:9px 11px;color:#7c3d45;font-weight:800}.records{display:grid;gap:12px}.record{border:1px solid var(--line);border-radius:24px;padding:15px;background:linear-gradient(135deg,#fff,#fffaf7)}.recordTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.recordTitle{font-weight:950;font-size:1.05rem}.meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}.tag{font-size:.82rem;font-weight:850;color:#8a2230;background:#ffe8ec;border:1px solid #ffd2d9;border-radius:999px;padding:6px 9px}.record p{margin:10px 0 0;color:var(--muted);line-height:1.55}.smallBtns{display:flex;gap:7px;flex-shrink:0}.smallBtns button{border:1px solid var(--line);border-radius:13px;background:#fff;color:var(--red);padding:8px 10px;font-weight:900}.empty{text-align:center;color:var(--muted);padding:28px;border:1px dashed #f1c7cf;border-radius:22px;background:#fff8fa}.login{position:fixed;inset:0;background:rgba(255,247,248,.88);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:center;padding:18px;z-index:10}.loginBox{width:min(420px,100%);background:#fff;border:1px solid var(--line);border-radius:32px;padding:26px;box-shadow:var(--shadow);text-align:center}.loginBox h2{margin:0 0 8px;font-size:1.7rem}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);opacity:0;background:#2a1518;color:#fff;border-radius:999px;padding:12px 16px;font-weight:850;transition:.25s;z-index:20}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:760px){body{padding:10px}.hero{border-radius:28px;padding:22px 18px}.hero h1{font-size:2.28rem}.grid{grid-template-columns:1fr;gap:12px}.card{border-radius:24px;padding:16px}.form{grid-template-columns:1fr;gap:11px}.stats{grid-template-columns:1fr 1fr}.stat{padding:15px;border-radius:21px}.stat b{font-size:1.8rem}.titleRow{flex-direction:column}.monthLine{align-items:stretch}.monthLine input{max-width:none}.btn{width:100%;min-height:50px}.actions .btn.secondary{width:calc(50% - 5px)}.recordTop{flex-direction:column}.smallBtns{width:100%}.smallBtns button{flex:1}.topbar{gap:8px}.pill{font-size:.82rem;padding:8px 10px}}@media(max-width:390px){.stats{grid-template-columns:1fr}.hero h1{font-size:2rem}}</style></head><body><div id="login" class="login"><div class="loginBox"><div class="eyebrow">🐦 小鸽入口</div><h2>进入工作台</h2><p class="sub">请输入访问口令</p><input id="code" type="password" placeholder="访问口令" autocomplete="current-password"><div class="actions"><button class="btn" id="enterBtn">进入</button></div></div></div><main class="app"><section class="hero"><div class="eyebrow">XIAOGE THEATER · MOBILE READY</div><h1>小鸽剧场工作台🤯</h1><p>一个剧场，一个小团队。手机上也可以轻松录入场次，自动统计每月用途、人员次数和观众人数。</p><div class="topbar"><span class="pill">🎀 可爱红色 iOS 风</span><span class="pill">📱 手机自适应</span><span class="pill">☁️ 云端同步</span></div></section><section class="grid"><div class="card"><div class="titleRow"><div><h2>新增 / 修改场次</h2><div class="sub">场地固定为小鸽剧场，只需要填写场次信息。</div></div><div id="status" class="status">准备连接...</div></div><div class="form"><div class="field"><label for="date">日期</label><input id="date" type="date" required></div><div class="field"><label for="period">时段</label><select id="period"><option>上午</option><option>下午</option><option selected>晚上</option><option>全天</option></select></div><div class="field"><label for="purpose">用途</label><select id="purpose" required><option value="">请选择用途</option><option>彩排</option><option>演出</option><option>会议</option><option>培训</option><option>其他</option></select></div><div class="field"><label for="staff">工作人员</label><select id="staff" required><option value="">请选择人员</option><option>黄鑫</option><option>李鼎一</option><option>李贺军</option><option>牛梦鸽</option></select></div><div class="field"><label for="audience">人数</label><input id="audience" type="number" min="0" inputmode="numeric" placeholder="例如 120"></div><div class="field"><label for="project">项目名称</label><input id="project" placeholder="例如 某某演出 / 某某会议"></div><div class="field full"><label for="unit">租用单位</label><input id="unit" placeholder="可不填"></div><div class="field full"><label for="note">备注</label><textarea id="note" placeholder="临时说明、特殊情况等"></textarea></div></div><div class="actions"><button class="btn" id="saveBtn">保存记录</button><button class="btn secondary" id="clearBtn">清空</button></div></div><div class="card"><div class="titleRow"><div><h2>月度统计</h2><div class="sub">统计留出更大间距，手机上更清楚。</div></div></div><div class="monthLine"><label for="month">月份</label><input id="month" type="month"><button class="btn secondary" id="refreshBtn">刷新</button></div><div class="stats"><div class="stat"><b id="total">0</b><span>总场次</span></div><div class="stat"><b id="showCount">0</b><span>演出</span></div><div class="stat"><b id="peopleCount">0</b><span>参与人员</span></div><div class="stat"><b id="audienceSum">0</b><span>总人数</span></div></div><h3 style="margin-top:18px">用途分布</h3><div id="purposeStats" class="chips"></div><h3 style="margin-top:18px">人员次数</h3><div id="staffStats" class="chips"></div><div class="actions"><button class="btn secondary" id="exportBtn">导出 CSV</button><button class="btn secondary" id="backupBtn">备份 JSON</button></div></div></section><section class="card" style="margin-top:18px"><div class="titleRow"><div><h2>场次明细</h2><div class="sub">每条记录都可以修改或删除。</div></div></div><div id="records" class="records"></div></section></main><div id="toast" class="toast"></div><script>const SUPABASE_URL='https://vyanfrewgpkfsardhghl.supabase.co';const SUPABASE_KEY='sb_publishable_AbjKlx7-1WxRS1gy-y35Qw_6EH6uA24';const ACCESS_CODE='xiaoge2026';const TABLE='theater_records';const FIXED_THEATER='小鸽剧场';const LOCAL_KEY='xiaoge_theater_local';const $=function(id){return document.getElementById(id)};let sb=null;let online=false;let records=[];let editingId=null;const fields=['date','period','purpose','audience','project','unit','staff','note'];function toast(text){$('toast').textContent=text;$('toast').classList.add('show');setTimeout(function(){$('toast').classList.remove('show')},2200)}function today(){return new Date().toISOString().slice(0,10)}function thisMonth(){return new Date().toISOString().slice(0,7)}function setStatus(text){$('status').textContent=text}function rowToRecord(x){return{id:x.id,date:x.date||'',period:x.period||'',theater:x.theater||FIXED_THEATER,audience:Number(x.audience||0),purpose:x.purpose||x.category||'其他',project:x.project||'',unit:x.unit||'',staff:x.staff||'',staffList:Array.isArray(x.staff_list)?x.staff_list:(x.staff?[x.staff]:[]),category:x.category||x.purpose||'其他',note:x.note||''}}function toDb(x){return{date:x.date,period:x.period,theater:FIXED_THEATER,audience:Number(x.audience||0),purpose:x.purpose,project:x.project,unit:x.unit,staff:x.staff,staff_list:x.staff?[x.staff]:[],category:x.purpose,note:x.note}}function localLoad(){try{return JSON.parse(localStorage.getItem(LOCAL_KEY)||'[]')}catch(e){return[]}}function localSave(){localStorage.setItem(LOCAL_KEY,JSON.stringify(records))}async function initCloud(){try{if(window.supabase&&SUPABASE_URL&&SUPABASE_KEY){sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);online=true;return true}}catch(e){}online=false;return false}async function load(){setStatus('正在读取云端数据...');if(!sb){await initCloud()}try{if(online){const res=await sb.from(TABLE).select('*').order('date',{ascending:false}).order('created_at',{ascending:false});if(res.error)throw res.error;records=(res.data||[]).map(rowToRecord);setStatus('已连接云数据库，手机和电脑会同步。')}else{records=localLoad();setStatus('本地演示模式。')}}catch(e){online=false;records=localLoad();setStatus('云端连接失败，暂时使用本地模式。');toast('云端连接失败')}render()}function collect(){const data={};fields.forEach(function(id){data[id]=$(id).value.trim()});data.audience=Number(data.audience||0);data.theater=FIXED_THEATER;data.category=data.purpose;data.staffList=data.staff?[data.staff]:[];return data}function fillForm(x){fields.forEach(function(id){$(id).value=x[id]||''});$('audience').value=x.audience||'';editingId=x.id;window.scrollTo({top:document.querySelector('.grid').offsetTop-8,behavior:'smooth'});toast('已放入表单，可以修改啦')}function clearForm(){editingId=null;fields.forEach(function(id){$(id).value=''});$('date').value=today();$('period').value='晚上'}async function saveRecord(){const data=collect();if(!data.date)return toast('先选日期');if(!data.purpose)return toast('请选择用途');if(!data.staff)return toast('请选择工作人员');try{if(online){let res;if(editingId){res=await sb.from(TABLE).update(toDb(data)).eq('id',editingId).select().single()}else{res=await sb.from(TABLE).insert(toDb(data)).select().single()}if(res.error)throw res.error}else{if(editingId){records=records.map(function(r){return r.id===editingId?Object.assign({},r,data):r})}else{data.id=crypto.randomUUID?crypto.randomUUID():String(Date.now());records.unshift(data)}localSave()}toast(editingId?'修改成功':'保存成功');clearForm();await load()}catch(e){toast('保存失败：'+(e.message||'请稍后重试'))}}async function deleteRecord(id){if(!confirm('确定删除这条记录吗？'))return;try{if(online){const res=await sb.from(TABLE).delete().eq('id',id);if(res.error)throw res.error}else{records=records.filter(function(r){return r.id!==id});localSave()}toast('已删除');await load()}catch(e){toast('删除失败')}}function monthRecords(){const m=$('month').value||thisMonth();return records.filter(function(r){return String(r.date||'').startsWith(m)})}function countBy(list,key){const map={};list.forEach(function(r){const v=r[key]||'未填写';map[v]=(map[v]||0)+1});return map}function chips(id,map){const box=$(id);const keys=Object.keys(map).sort(function(a,b){return map[b]-map[a]});box.innerHTML=keys.length?keys.map(function(k){return '<span class="chip">'+escapeHtml(k)+' '+map[k]+'</span>'}).join(''):'<span class="chip">暂无 0</span>'}function render(){const list=monthRecords();$('total').textContent=list.length;$('showCount').textContent=list.filter(function(r){return r.purpose==='演出'}).length;$('peopleCount').textContent=new Set(list.map(function(r){return r.staff}).filter(Boolean)).size;$('audienceSum').textContent=list.reduce(function(s,r){return s+Number(r.audience||0)},0);chips('purposeStats',countBy(list,'purpose'));chips('staffStats',countBy(list,'staff'));const box=$('records');if(!list.length){box.innerHTML='<div class="empty">这个月还没有记录，小鸽等你录入第一条 🐦</div>';return}box.innerHTML=list.map(function(r){return '<article class="record"><div class="recordTop"><div><div class="recordTitle">'+escapeHtml(r.project||r.purpose||'未命名场次')+'</div><div class="meta"><span class="tag">'+escapeHtml(r.date)+'</span><span class="tag">'+escapeHtml(r.period||'')+'</span><span class="tag">'+escapeHtml(r.purpose||'其他')+'</span><span class="tag">'+escapeHtml(r.staff||'未填人员')+'</span><span class="tag">'+Number(r.audience||0)+' 人</span></div></div><div class="smallBtns"><button onclick="editRecord(\''+r.id+'\')">改</button><button onclick="deleteRecord(\''+r.id+'\')">删</button></div></div><p>'+(r.unit?'单位：'+escapeHtml(r.unit)+' · ':'')+(r.note?escapeHtml(r.note):'无备注')+'</p></article>'}).join('')}function editRecord(id){const r=records.find(function(x){return x.id===id});if(r)fillForm(r)}function escapeHtml(s){return String(s||'').replace(/[&<>'"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]})}function csvEscape(v){return '"'+String(v||'').replace(/"/g,'""')+'"'}function download(name,text,type){const blob=new Blob([text],{type:type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}function exportCsv(){const head=['日期','时段','用途','项目名称','租用单位','工作人员','人数','备注'];const rows=monthRecords().map(function(r){return[r.date,r.period,r.purpose,r.project,r.unit,r.staff,r.audience,r.note].map(csvEscape).join(',')});download('小鸽剧场场次统计_'+($('month').value||thisMonth())+'.csv','\ufeff'+head.join(',')+'\n'+rows.join('\n'),'text/csv;charset=utf-8')}function backupJson(){download('小鸽剧场备份_'+today()+'.json',JSON.stringify(records,null,2),'application/json')}function unlock(){if($('code').value.trim()!==ACCESS_CODE)return toast('口令不正确');sessionStorage.setItem('xiaoge_ok',ACCESS_CODE);$('login').style.display='none';load()}$('enterBtn').onclick=unlock;$('code').addEventListener('keydown',function(e){if(e.key==='Enter')unlock()});$('saveBtn').onclick=saveRecord;$('clearBtn').onclick=clearForm;$('refreshBtn').onclick=load;$('exportBtn').onclick=exportCsv;$('backupBtn').onclick=backupJson;$('month').onchange=render;fields.forEach(function(id){$(id).addEventListener('change',function(){if(id==='purpose')$('purpose').value=$('purpose').value})});$('date').value=today();$('month').value=thisMonth();if(sessionStorage.getItem('xiaoge_ok')===ACCESS_CODE){$('login').style.display='none';load()}</script></body></html>
