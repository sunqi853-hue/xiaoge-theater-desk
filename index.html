<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>小鸽剧场工作台🤯</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--red:#c92335;--red2:#ff6b78;--ink:#2a1518;--muted:#8f6269;--line:#f4d8dd;--soft:#fff7f8;--card:#fffdfa;--shadow:0 18px 46px rgba(166,38,55,.14)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 0 0,#ffd8df 0 210px,transparent 360px),radial-gradient(circle at 100% 10%,#fff0c7 0 180px,transparent 330px),linear-gradient(180deg,#fff7f8,#fffaf3 60%,#fff7f8);padding:18px}
    .app{width:min(1080px,100%);margin:auto}
    .hero{position:relative;overflow:hidden;padding:30px 28px 34px;border-radius:34px;background:linear-gradient(135deg,#fff,#fff1f3 56%,#fff9e8);border:1px solid #fff;box-shadow:var(--shadow)}
    .hero:after{content:"🐦";position:absolute;right:22px;top:12px;font-size:76px;opacity:.13;transform:rotate(-10deg)}
    .eyebrow{display:inline-flex;align-items:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 13px;color:var(--red);font-size:.82rem;font-weight:850}
    h1{position:relative;margin:18px 0 0;font-size:clamp(2.1rem,6vw,4.3rem);line-height:1;letter-spacing:-.05em}
    h2,h3{margin:0;line-height:1.18}
    .grid{display:grid;grid-template-columns:1.04fr .96fr;gap:22px;margin-top:22px}
    .card{background:rgba(255,253,250,.94);border:1px solid #fff;border-radius:30px;box-shadow:var(--shadow);padding:24px}
    .sectionHead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:22px}
    .status{display:inline-flex;align-items:center;max-width:100%;padding:10px 13px;border-radius:999px;background:#fff3f5;border:1px solid var(--line);color:#8e1e2b;font-size:.86rem;font-weight:850}
    .form{display:grid;grid-template-columns:1fr 1fr;gap:17px 15px}
    .field{display:flex;flex-direction:column;gap:8px}
    .full{grid-column:1/-1}
    label{font-size:.88rem;color:#74464d;font-weight:850}
    input,select,textarea{width:100%;min-height:52px;border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px 15px;font:inherit;color:var(--ink);outline:none}
    textarea{min-height:92px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:#ff8e99;box-shadow:0 0 0 4px #ff6b781f}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
    .btn{border:0;border-radius:18px;padding:14px 18px;font-weight:950;color:#fff;background:linear-gradient(135deg,var(--red),var(--red2));box-shadow:0 12px 22px rgba(201,35,53,.22);cursor:pointer}
    .btn.secondary{background:#fff;color:var(--red);border:1px solid var(--line);box-shadow:none}
    .monthLine{display:grid;grid-template-columns:auto 1fr auto;gap:11px;align-items:center;margin-bottom:18px}
    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .stat{position:relative;overflow:hidden;border-radius:24px;padding:20px;background:linear-gradient(135deg,#fff,#fff1f3);border:1px solid var(--line)}
    .stat b{display:block;margin-bottom:8px;color:var(--red);font-size:2.15rem;line-height:1}
    .stat span{color:var(--muted);font-weight:850}
    .statsBlock{margin-top:22px}
    .chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:11px}
    .chip,.tag{display:inline-flex;align-items:center;border-radius:999px;font-weight:850}
    .chip{background:#fff;border:1px solid var(--line);padding:9px 12px;color:#7c3d45}
    .records{display:grid;gap:14px}
    .record{border:1px solid var(--line);border-radius:24px;padding:17px;background:linear-gradient(135deg,#fff,#fffaf7)}
    .recordTop{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
    .recordTitle{font-weight:950;font-size:1.07rem;line-height:1.45}
    .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .tag{font-size:.82rem;color:#8a2230;background:#ffe8ec;border:1px solid #ffd2d9;padding:6px 10px}
    .record p{margin:12px 0 0;color:var(--muted);line-height:1.6}
    .smallBtns{display:flex;gap:8px;flex-shrink:0}
    .smallBtns button{border:1px solid var(--line);border-radius:13px;background:#fff;color:var(--red);padding:8px 11px;font-weight:950}
    .empty{text-align:center;color:var(--muted);padding:30px;border:1px dashed #f1c7cf;border-radius:22px;background:#fff8fa}
    .login{position:fixed;inset:0;background:rgba(255,247,248,.88);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:center;padding:18px;z-index:10}
    .loginBox{width:min(420px,100%);background:#fff;border:1px solid var(--line);border-radius:32px;padding:28px;box-shadow:var(--shadow);text-align:center}
    .loginBox h2{margin:14px 0 18px}
    .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);opacity:0;background:#2a1518;color:#fff;border-radius:999px;padding:12px 16px;font-weight:850;transition:.25s;z-index:20}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:760px){
      body{padding:12px}
      .hero{border-radius:30px;padding:24px 20px 30px}
      .hero h1{font-size:2.38rem}
      .grid{grid-template-columns:1fr;gap:18px;margin-top:18px}
      .card{border-radius:26px;padding:21px 20px}
      .sectionHead{flex-direction:column;margin-bottom:20px}
      .form{grid-template-columns:1fr;gap:16px}
      .monthLine{grid-template-columns:1fr;gap:9px}
      .stats{gap:12px}
      .stat{padding:18px}
      .btn{width:100%;min-height:52px}
      .actions .btn.secondary{width:calc(50% - 6px)}
      .recordTop{flex-direction:column}
      .smallBtns{width:100%}
      .smallBtns button{flex:1}
    }
    @media(max-width:390px){.stats{grid-template-columns:1fr}.hero h1{font-size:2.08rem}}
  </style>
</head>
<body>
  <div id="login" class="login">
    <div class="loginBox">
      <div class="eyebrow">🐦 小鸽入口</div>
      <h2>进入工作台</h2>
      <input id="code" type="password" placeholder="访问口令" autocomplete="current-password">
      <div class="actions"><button class="btn" id="enterBtn">进入</button></div>
    </div>
  </div>
  <main class="app">
    <section class="hero">
      <div class="eyebrow">小鸽剧场</div>
      <h1>小鸽剧场工作台🤯</h1>
    </section>
    <section class="grid">
      <div class="card">
        <div class="sectionHead">
          <h2>新增 / 修改场次</h2>
          <div id="status" class="status">准备连接...</div>
        </div>
        <div class="form">
          <div class="field"><label for="date">日期</label><input id="date" type="date"></div>
          <div class="field"><label for="period">时段</label><select id="period"><option>上午</option><option>下午</option><option selected>晚上</option><option>全天</option></select></div>
          <div class="field"><label for="purpose">用途</label><select id="purpose"><option value="">请选择用途</option><option>彩排</option><option>演出</option><option>会议</option><option>培训</option><option>其他</option></select></div>
          <div class="field"><label for="audience">人数</label><input id="audience" type="number" min="0" inputmode="numeric"></div>
          <div class="field full"><label for="staff">工作人员</label><input id="staff" placeholder="黄鑫、李鼎一"></div>
          <div class="field full"><label for="project">项目名称</label><input id="project"></div>
          <div class="field full"><label for="unit">租用单位</label><input id="unit"></div>
          <div class="field full"><label for="note">备注</label><textarea id="note"></textarea></div>
        </div>
        <div class="actions"><button class="btn" id="saveBtn">保存记录</button><button class="btn secondary" id="clearBtn">清空</button></div>
      </div>
      <div class="card">
        <div class="sectionHead"><h2>月度统计</h2></div>
        <div class="monthLine"><label for="month">月份</label><input id="month" type="month"><button class="btn secondary" id="refreshBtn">刷新</button></div>
        <div class="stats">
          <div class="stat"><b id="total">0</b><span>总场次</span></div>
          <div class="stat"><b id="showCount">0</b><span>演出</span></div>
          <div class="stat"><b id="peopleCount">0</b><span>参与人员</span></div>
          <div class="stat"><b id="audienceSum">0</b><span>总人数</span></div>
        </div>
        <div class="statsBlock"><h3>用途分布</h3><div id="purposeStats" class="chips"></div></div>
        <div class="statsBlock"><h3>人员次数</h3><div id="staffStats" class="chips"></div></div>
        <div class="actions"><button class="btn secondary" id="exportBtn">导出 CSV</button><button class="btn secondary" id="backupBtn">备份 JSON</button></div>
      </div>
    </section>
    <section class="card" style="margin-top:22px"><div class="sectionHead"><h2>场次明细</h2></div><div id="records" class="records"></div></section>
  </main>
  <div id="toast" class="toast"></div>
  <script>
    const SUPABASE_URL='https://vyanfrewgpkfsardhghl.supabase.co',SUPABASE_KEY='sb_publishable_AbjKlx7-1WxRS1gy-y35Qw_6EH6uA24',ACCESS_CODE='xiaoge2026',TABLE='theater_records',FIXED_THEATER='小鸽剧场',LOCAL_KEY='xiaoge_theater_local';
    const $=id=>document.getElementById(id);let sb=null,online=false,records=[],editingId=null;const fields=['date','period','purpose','audience','project','unit','staff','note'];
    function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2200)}
    function today(){return new Date().toISOString().slice(0,10)}
    function thisMonth(){return new Date().toISOString().slice(0,7)}
    function splitStaff(s){return String(s||'').split(/[、,，\s]+/).map(x=>x.trim()).filter(Boolean)}
    function rowToRecord(x){let list=Array.isArray(x.staff_list)?x.staff_list:splitStaff(x.staff);return{id:x.id,date:x.date||'',period:x.period||'',theater:x.theater||FIXED_THEATER,audience:Number(x.audience||0),purpose:x.purpose||x.category||'其他',project:x.project||'',unit:x.unit||'',staff:x.staff||list.join('、'),staffList:list,category:x.category||x.purpose||'其他',note:x.note||''}}
    function toDb(x){return{date:x.date,period:x.period,theater:FIXED_THEATER,audience:Number(x.audience||0),purpose:x.purpose,project:x.project,unit:x.unit,staff:x.staffList.join(','),staff_list:x.staffList,category:x.purpose,note:x.note}}
    function localLoad(){try{return JSON.parse(localStorage.getItem(LOCAL_KEY)||'[]')}catch(e){return[]}}
    function localSave(){localStorage.setItem(LOCAL_KEY,JSON.stringify(records))}
    async function initCloud(){try{if(window.supabase){sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);online=true;return true}}catch(e){}online=false;return false}
    async function load(){$('status').textContent='正在读取...';if(!sb)await initCloud();try{if(online){const res=await sb.from(TABLE).select('*').order('date',{ascending:false}).order('created_at',{ascending:false});if(res.error)throw res.error;records=(res.data||[]).map(rowToRecord);$('status').textContent='云端同步中'}else{records=localLoad();$('status').textContent='本地模式'}}catch(e){online=false;records=localLoad();$('status').textContent='云端连接失败';toast('云端连接失败')}render()}
    function collect(){const d={};fields.forEach(id=>d[id]=$(id).value.trim());d.audience=Number(d.audience||0);d.theater=FIXED_THEATER;d.category=d.purpose;d.staffList=splitStaff(d.staff);return d}
    function fillForm(x){fields.forEach(id=>$(id).value=x[id]||'');$('staff').value=(x.staffList||splitStaff(x.staff)).join('、');$('audience').value=x.audience||'';editingId=x.id;window.scrollTo({top:document.querySelector('.grid').offsetTop-8,behavior:'smooth'});toast('已放入表单')}
    function clearForm(){editingId=null;fields.forEach(id=>$(id).value='');$('date').value=today();$('period').value='晚上'}
    async function saveRecord(){const d=collect();if(!d.date)return toast('先选日期');if(!d.purpose)return toast('请选择用途');if(!d.staffList.length)return toast('请填写工作人员');try{if(online){let res=editingId?await sb.from(TABLE).update(toDb(d)).eq('id',editingId).select().single():await sb.from(TABLE).insert(toDb(d)).select().single();if(res.error)throw res.error}else{if(editingId)records=records.map(r=>r.id===editingId?Object.assign({},r,d):r);else{d.id=crypto.randomUUID?crypto.randomUUID():String(Date.now());records.unshift(d)}localSave()}toast(editingId?'修改成功':'保存成功');clearForm();await load()}catch(e){toast('保存失败：'+(e.message||'请稍后重试'))}}
    async function deleteRecord(id){if(!confirm('确定删除这条记录吗？'))return;try{if(online){const res=await sb.from(TABLE).delete().eq('id',id);if(res.error)throw res.error}else{records=records.filter(r=>r.id!==id);localSave()}toast('已删除');await load()}catch(e){toast('删除失败')}}
    function monthRecords(){const m=$('month').value||thisMonth();return records.filter(r=>String(r.date||'').startsWith(m))}
    function countBy(list,key){const m={};list.forEach(r=>{const v=r[key]||'未填写';m[v]=(m[v]||0)+1});return m}
    function countStaff(list){const m={};list.forEach(r=>(r.staffList||splitStaff(r.staff)).forEach(n=>m[n]=(m[n]||0)+1));return m}
    function chips(id,map){const ks=Object.keys(map).sort((a,b)=>map[b]-map[a]);$(id).innerHTML=ks.length?ks.map(k=>'<span class="chip">'+esc(k)+' '+map[k]+'</span>').join(''):'<span class="chip">暂无 0</span>'}
    function render(){const list=monthRecords();$('total').textContent=list.length;$('showCount').textContent=list.filter(r=>r.purpose==='演出').length;$('peopleCount').textContent=new Set(list.flatMap(r=>r.staffList||splitStaff(r.staff))).size;$('audienceSum').textContent=list.reduce((s,r)=>s+Number(r.audience||0),0);chips('purposeStats',countBy(list,'purpose'));chips('staffStats',countStaff(list));const box=$('records');if(!list.length){box.innerHTML='<div class="empty">这个月还没有记录，小鸽等你录入第一条 🐦</div>';return}box.innerHTML=list.map(r=>'<article class="record"><div class="recordTop"><div><div class="recordTitle">'+esc(r.project||r.purpose||'未命名场次')+'</div><div class="meta"><span class="tag">'+esc(r.date)+'</span><span class="tag">'+esc(r.period)+'</span><span class="tag">'+esc(r.purpose)+'</span><span class="tag">'+esc((r.staffList||splitStaff(r.staff)).join('、')||'未填人员')+'</span><span class="tag">'+Number(r.audience||0)+' 人</span></div></div><div class="smallBtns"><button onclick="editRecord(\''+r.id+'\')">改</button><button onclick="deleteRecord(\''+r.id+'\')">删</button></div></div><p>'+(r.unit?'单位：'+esc(r.unit)+' · ':'')+(r.note?esc(r.note):'无备注')+'</p></article>').join('')}
    function editRecord(id){const r=records.find(x=>x.id===id);if(r)fillForm(r)}
    function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
    function csvEscape(v){return '"'+String(v||'').replace(/"/g,'""')+'"'}
    function download(name,text,type){const blob=new Blob([text],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}
    function exportCsv(){const head=['日期','时段','用途','项目名称','租用单位','工作人员','人数','备注'];const rows=monthRecords().map(r=>[r.date,r.period,r.purpose,r.project,r.unit,(r.staffList||splitStaff(r.staff)).join('、'),r.audience,r.note].map(csvEscape).join(','));download('小鸽剧场场次统计_'+($('month').value||thisMonth())+'.csv','\ufeff'+head.join(',')+'\n'+rows.join('\n'),'text/csv;charset=utf-8')}
    function backupJson(){download('小鸽剧场备份_'+today()+'.json',JSON.stringify(records,null,2),'application/json')}
    function unlock(){if($('code').value.trim()!==ACCESS_CODE)return toast('口令不正确');sessionStorage.setItem('xiaoge_ok',ACCESS_CODE);$('login').style.display='none';load()}
    $('enterBtn').onclick=unlock;$('code').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});$('saveBtn').onclick=saveRecord;$('clearBtn').onclick=clearForm;$('refreshBtn').onclick=load;$('exportBtn').onclick=exportCsv;$('backupBtn').onclick=backupJson;$('month').onchange=render;$('date').value=today();$('month').value=thisMonth();if(sessionStorage.getItem('xiaoge_ok')===ACCESS_CODE){$('login').style.display='none';load()}
  </script>
</body>
</html>
