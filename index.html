<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>小鸽剧场工作台🤯</title><style>:root{--bg:#f5f5f7;--card:#ffffffe0;--ink:#1d1d1f;--muted:#6e6e73;--line:#1d1d1f1a;--red:#b4232f;--red2:#ff5a66;--shadow:0 22px 60px #68131f1f}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif;color:var(--ink);background:radial-gradient(circle at 10% 0,#ff5a6633,transparent 26rem),radial-gradient(circle at 90% 0,#b4232f24,transparent 28rem),var(--bg)}header,main{width:min(1160px,calc(100% - 28px));margin:auto}header{padding:32px 0 18px}.hero,.card{border:1px solid #ffffffb8;background:var(--card);box-shadow:var(--shadow);backdrop-filter:blur(22px);border-radius:28px}.hero{padding:34px;display:grid;grid-template-columns:1.35fr .65fr;gap:20px;overflow:hidden}.ey{display:inline-block;padding:7px 12px;border-radius:999px;background:#ff5a6617;color:var(--red);font-size:12px;font-weight:800;letter-spacing:.08em}h1{margin:16px 0 10px;font-size:clamp(30px,5vw,52px);letter-spacing:-.06em}.sub{color:var(--muted);line-height:1.8}.tip{background:linear-gradient(145deg,#c92838,#7f1423);color:#fff;border-radius:24px;padding:22px}.tip p{color:#ffffffcc}.pills{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.pills span{padding:8px 12px;border-radius:999px;background:#fff;color:var(--red);border:1px solid #b4232f18;font-weight:700;font-size:13px}main{display:grid;gap:18px;padding-bottom:42px}.grid{display:grid;grid-template-columns:.92fr 1.08fr;gap:18px}.card{padding:22px}h2{margin:0 0 14px;font-size:19px}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}label{display:block;margin:0 0 6px;color:#555;font-size:13px;font-weight:700}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 13px;background:#ffffffc7;font:inherit;outline:none}textarea{min-height:74px}input:focus,select:focus,textarea:focus{border-color:#ff5a6699;box-shadow:0 0 0 5px #ff5a6620;background:#fff}button{border:0;border-radius:999px;padding:11px 17px;background:linear-gradient(135deg,var(--red),var(--red2));color:white;font-weight:800;cursor:pointer;box-shadow:0 12px 26px #b4232f33}button.secondary{background:#ffffffa8;color:var(--red);border:1px solid #b4232f22;box-shadow:none}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.badge{display:inline-flex;padding:5px 10px;border-radius:999px;background:var(--red);color:#fff;font-weight:800;font-size:12px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{border:1px solid var(--line);background:#ffffffb8;border-radius:20px;padding:15px}.num{font-size:28px;font-weight:900;color:var(--red)}.name,.hint{color:var(--muted);font-size:13px}.toolbar{display:flex;justify-content:space-between;gap:12px;align-items:end;flex-wrap:wrap}.filters{display:flex;gap:10px}.table{overflow:auto;border:1px solid var(--line);border-radius:20px;background:#ffffffb8}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:10px;border-bottom:1px solid #1d1d1f12;text-align:left;vertical-align:top}th{background:#fff6f7;color:var(--red)}.rank{display:grid;grid-template-columns:1fr 1fr;gap:12px}.box{border:1px solid var(--line);background:#ffffff99;border-radius:18px;padding:14px}.box ul{padding:0;margin:0;list-style:none}.box li{display:flex;justify-content:space-between;border-bottom:1px dashed #b4232f24;padding:7px 0;color:var(--muted)}.login{position:fixed;inset:0;display:grid;place-items:center;background:#f5f5f7dd;backdrop-filter:blur(18px);z-index:9}.login .card{width:min(420px,calc(100% - 28px));text-align:center}.toast{position:fixed;right:18px;bottom:18px;background:#1d1d1fee;color:white;border-radius:14px;padding:12px 16px;opacity:0;transform:translateY(15px);transition:.2s}.toast.show{opacity:1;transform:none}@media(max-width:850px){.hero,.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.rank{grid-template-columns:1fr}}@media(max-width:560px){.form,.filters,.stats{grid-template-columns:1fr;display:grid}}</style></head><body><div class="login" id="login"><section class="card"><h2>进入小鸽剧场工作台🤯</h2><p class="sub">请输入访问口令</p><input id="code" type="password" placeholder="访问口令"><div class="actions"><button onclick="unlock()">进入</button><button class="secondary" onclick="demo()">本地演示</button></div></section></div><header><section class="hero"><div><span class="ey">XIAOGE STAGE DESK · ONLINE</span><h1>小鸽剧场工作台🤯</h1><p class="sub">在线同步版。手机和电脑打开同一个网址，录入、修改和删除都会保存到云数据库。</p><div class="pills"><span id="mode">正在连接</span><span>自动分类</span><span>月度统计</span><span>CSV导出</span></div></div><aside class="tip"><h2>使用提示</h2><p>访问口令：xiaoge2026。数据已接入 Supabase，手机和电脑打开同一个网址即可同步。</p></aside></section></header><main><section class="card toolbar"><div><h2>连接状态</h2><p class="hint" id="status">准备中……</p></div><button class="secondary" onclick="load()">刷新数据</button></section><section class="grid"><form class="card" id="f"><h2>新增 / 修改场次</h2><div class="form"><div><label>日期</label><input id="date" type="date" required></div><div><label>时段</label><select id="period"><option>上午</option><option>下午</option><option selected>晚上</option><option>全天</option></select></div><div><label>剧场 / 场地</label><input id="theater" required placeholder="大剧场 / 小剧场"></div><div><label>人数</label><input id="audience" type="number" min="0"></div><div class="full"><label>租用用途</label><input id="purpose" required placeholder="演出 / 彩排 / 会议 / 培训"></div><div class="full"><label>项目名称</label><input id="project" placeholder="某某音乐会"></div><div class="full"><label>租用单位</label><input id="unit"></div><div class="full"><label>工作人员</label><textarea id="staff" placeholder="张三、李四、王五"></textarea></div><div class="full"><label>备注</label><textarea id="note"></textarea></div><div class="full hint">系统识别分类：<span class="badge" id="cat">其他</span></div></div><div class="actions"><button id="save">保存记录</button><button type="button" class="secondary" onclick="resetForm()">清空</button></div></form><section class="card"><div class="toolbar"><div><h2>月度统计</h2><p class="hint">按月份自动统计</p></div><div class="filters"><input id="month" type="month"><input id="kw" placeholder="搜索"></div></div><div class="stats"><div class="stat"><div class="num" id="n1">0</div><div class="name">总记录</div></div><div class="stat"><div class="num" id="n2">0</div><div class="name">演出</div></div><div class="stat"><div class="num" id="n3">0</div><div class="name">人员</div></div><div class="stat"><div class="num" id="n4">0</div><div class="name">人数</div></div></div><div class="rank"><div class="box"><h3>用途分类</h3><ul id="r1"></ul></div><div class="box"><h3>人员次数</h3><ul id="r2"></ul></div></div><div class="actions"><button onclick="csv()">导出CSV</button><button class="secondary" onclick="backup()">备份JSON</button></div></section></section><section class="card"><div class="toolbar"><div><h2>场次明细</h2><p class="hint">可修改或删除</p></div><button onclick="clearAll()">清空全部</button></div><div class="table" id="table"></div></section></main><div class="toast" id="toast"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>const SUPABASE_URL='https://vyanfrewgpkfsardhghl.supabase.co',KEY='sb_publishable_AbjKlx7-1WxRS1gy-y35Qw_6EH6uA24',CODE='xiaoge2026',T='theater_records',L='xiaoge_demo';const $=id=>document.getElementById(id);let sb=null,online=null,records=[],edit=null;const fs=['date','period','theater','audience','purpose','project','unit','staff','note'];const rules={演出:['演出','音乐会','话剧','舞剧','戏曲','汇演'],彩排:['彩排','排练','联排','走台'],会议:['会议','论坛','讲座','研讨'],培训:['培训','课程','教学'],装撤台:['装台','撤台','搭建','进场','撤场'],活动:['活动','发布会','年会','典礼','晚会','比赛']};function toast(s){$('toast').textContent=s;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2200)}function today(){return new Date().toISOString().slice(0,10)}function mon(){return new Date().toISOString().slice(0,7)}function staff(s){return String(s||'').split(/[、,，;；\n\r\t ]+/).map(x=>x.trim()).filter(Boolean)}function cat(){let t=($('purpose').value+' '+$('project').value).toLowerCase();for(let k in rules)if(rules[k].some(w=>t.includes(w.toLowerCase())))return k;return '其他'}function showCat(){let c=cat();$('cat').textContent=c;$('cat').className='badge'}function unlock(){if($('code').value.trim()!==CODE)return toast('口令不正确');sessionStorage.ok=CODE;$('login').style.display='none';load()}function demo(){online=false;$('login').style.display='none';load()}function mapRow(x){return{id:x.id,date:x.date||'',period:x.period||'',theater:x.theater||'',audience:+(x.audience||0),purpose:x.purpose||'',project:x.project||'',unit:x.unit||'',staff:x.staff||'',staffList:Array.isArray(x.staff_list)?x.staff_list:staff(x.staff),category:x.category||'其他',note:x.note||''}}function db(x){return{date:x.date,period:x.period,theater:x.theater,audience:+(x.audience||0),purpose:x.purpose,project:x.project,unit:x.unit,staff:x.staff,staff_list:x.staffList,category:x.category,note:x.note}}async function load(){try{if(SUPABASE_URL&&KEY&&window.supabase&&online!==false){sb=supabase.createClient(SUPABASE_URL,KEY);online=true;$('mode').textContent='云端同步';$('status').textContent='正在读取云端数据……';let {data,error}=await sb.from(T).select('*').order('date',{ascending:false});if(error)throw error;records=(data||[]).map(mapRow);$('status').textContent='已连接云数据库，手机和电脑会同步。'}else{records=JSON.parse(localStorage.getItem(L)||'[]');$('mode').textContent='本地演示';$('status').textContent='本地演示模式。'}}catch(e){console.error(e);online=false;records=JSON.parse(localStorage.getItem(L)||'[]');$('mode').textContent='本地演示';$('status').textContent='云端连接失败，已切换本地演示。'}render()}function resetForm(){f.reset();$('date').value=today();edit=null;$('save').textContent='保存记录';showCat()}function data(){let x={};fs.forEach(id=>x[id]=$(id).value.trim());x.audience=+(x.audience||0);x.staffList=staff(x.staff);x.category=cat();return x}function local(){localStorage.setItem(L,JSON.stringify(records))}f.onsubmit=async e=>{e.preventDefault();let x=data();if(!x.date||!x.theater||!x.purpose)return toast('请填写日期、场地和用途');try{if(online){if(edit){let {data,error}=await sb.from(T).update(db(x)).eq('id',edit).select().single();if(error)throw error;records=records.map(r=>r.id===edit?mapRow(data):r)}else{let {data,error}=await sb.from(T).insert(db(x)).select().single();if(error)throw error;records.push(mapRow(data))}}else{if(edit)records=records.map(r=>r.id===edit?{...r,...x}:r);else records.push({id:crypto.randomUUID(),...x});local()}resetForm();render();toast('已保存')}catch(err){console.error(err);toast('保存失败，请检查云端配置')}};function list(){let m=$('month').value||mon(),k=$('kw').value.toLowerCase();return records.filter(r=>(!m||r.date.startsWith(m))&&(!k||Object.values(r).join(' ').toLowerCase().includes(k))).sort((a,b)=>(b.date+b.period).localeCompare(a.date+a.period))}function rank(obj){let a=Object.entries(obj).sort((a,b)=>b[1]-a[1]);return a.length?a.map(x=>`<li><span>${esc(x[0])}</span><b>${x[1]}</b></li>`).join(''):'<li><span>暂无</span><b>0</b></li>'}function render(){let l=list(),ss=new Set(l.flatMap(r=>r.staffList||staff(r.staff)));$('n1').textContent=l.length;$('n2').textContent=l.filter(r=>r.category==='演出').length;$('n3').textContent=ss.size;$('n4').textContent=l.reduce((s,r)=>s+(+r.audience||0),0);let c={},st={};l.forEach(r=>{c[r.category]=(c[r.category]||0)+1;(r.staffList||staff(r.staff)).forEach(n=>st[n]=(st[n]||0)+1)});$('r1').innerHTML=rank(c);$('r2').innerHTML=rank(st);$('table').innerHTML=l.length?`<table><thead><tr><th>日期</th><th>时段</th><th>场地</th><th>分类</th><th>用途</th><th>项目</th><th>工作人员</th><th>人数</th><th>操作</th></tr></thead><tbody>${l.map(r=>`<tr><td>${esc(r.date)}</td><td>${esc(r.period)}</td><td>${esc(r.theater)}</td><td><span class=badge>${esc(r.category)}</span></td><td>${esc(r.purpose)}</td><td>${esc(r.project)}</td><td>${esc((r.staffList||[]).join('、'))}</td><td>${r.audience||''}</td><td><button class=secondary onclick="ed('${r.id}')">改</button> <button onclick="del('${r.id}')">删</button></td></tr>`).join('')}</tbody></table>`:'<p class=hint style="padding:22px">暂无记录</p>'}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}window.ed=id=>{let r=records.find(x=>x.id===id);if(!r)return;fs.forEach(f=>$(f).value=r[f]??'');edit=id;$('save').textContent='保存修改';showCat();scrollTo({top:0,behavior:'smooth'})};window.del=async id=>{if(!confirm('确定删除吗？'))return;try{if(online){let {error}=await sb.from(T).delete().eq('id',id);if(error)throw error}records=records.filter(r=>r.id!==id);if(!online)local();render();toast('已删除')}catch(e){toast('删除失败')}};async function clearAll(){if(!confirm('确定清空全部数据吗？'))return;try{if(online){let {error}=await sb.from(T).delete().not('id','is',null);if(error)throw error}records=[];if(!online)local();render()}catch(e){toast('清空失败')}}function csv(){let l=list(),head=['日期','时段','场地','分类','用途','项目','单位','工作人员','人数','备注'];let rows=l.map(r=>[r.date,r.period,r.theater,r.category,r.purpose,r.project,r.unit,(r.staffList||[]).join('、'),r.audience,r.note]);down('小鸽剧场统计.csv','\ufeff'+[head,...rows].map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(',')).join('\n'),'text/csv')}function backup(){down('小鸽剧场备份.json',JSON.stringify({records},null,2),'application/json')}function down(n,c,t){let a=document.createElement('a'),u=URL.createObjectURL(new Blob([c],{type:t}));a.href=u;a.download=n;a.click();URL.revokeObjectURL(u)}purpose.oninput=project.oninput=showCat;month.oninput=kw.oninput=render;date.value=today();month.value=mon();showCat();if(sessionStorage.ok===CODE){login.style.display='none';load()}</script></body></html>
